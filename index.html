<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="main">

        <section class="allElems">
            <div class="todo elem" id="0">
                <img src="https://images.unsplash.com/photo-1718202248160-59558af70521?q=80&w=764&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                    alt="">
                <h2>Todo List</h2>
            </div>
            <div class="plan elem" id="1">
                <img src="https://images.unsplash.com/photo-1677249490921-3246e81f19e3?q=80&w=735&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                    alt="">
                <h2>Daily Planner</h2>
            </div>
            <div class="motivation elem" id="2">
                <img src="https://images.unsplash.com/photo-1648457257285-cfbc3781cc54?q=80&w=735&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                    alt="">
                <h2>Motivation</h2>
            </div>
            <div class="pomodoro elem" id="3">
                <img src="https://images.unsplash.com/photo-1635241161466-541f065683ba?q=80&w=880&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                    alt="">
                <h2>Pomodoro Timer</h2>
            </div>
            <div class="daily elem" id="4">
                <img src="https://images.unsplash.com/photo-1678986718987-76f0b9357e0f?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                    alt="">
                <h2>Daily Goals</h2>
            </div>

        </section>

        <section class="fullElem todo-list-full-page">
            <button class="back" id="0">Close</button>
            <h2>Todo List</h2>
            <div class="todo-container">
                <div class="addTask">
                    <form>
                        <input type="text" placeholder="Enter Task">
                        <textarea name="description" id="description" placeholder="Enter Description"></textarea>
                        <div class="checkbox-container">
                            <input type="checkbox" id="check">
                            <label for="check">Mark as Important</label>
                        </div>
                        <button type="submit" class="add-task-btn">Add Task</button>
                    </form>
                </div>
                <div class="allTasks">

                </div>
            </div>
        </section>

        <section class="fullElem daily-planner-full-page">
            <button class="back" id="1">Close</button>
            <h2>Daily Planner</h2>
        </section>

        <section class="fullElem motivation-full-page">
            <button class="back" id="2">Close</button>
            <h2>Motivation</h2>
        </section>

        <section class="fullElem pomodoro-full-page">
            <button class="back" id="3">Close</button>
            <h2>Pomodoro Timer</h2>
        </section>

        <section class="fullElem daily-goals-full-page">
            <button class="back" id="4">Close</button>
            <h2>Daily Goals</h2>
        </section>

    </div>

    <script src="script.js"></script>
</body>

</html>
